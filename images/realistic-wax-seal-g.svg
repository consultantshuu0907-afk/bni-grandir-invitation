      <stop offset="0.60" stop-color="#6b0c0d"/>
      <stop offset="0.73" stop-color="#2f0203"/>
      <stop offset="0.84" stop-color="#b02a21"/>
      <stop offset="1" stop-color="#540709"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="20%" y1="0" x2="80%" y2="100%">
      <stop offset="0" stop-color="#fff1a8"/>
      <stop offset="0.22" stop-color="#d0a236"/>
      <stop offset="0.52" stop-color="#7c4b0e"/>
      <stop offset="0.76" stop-color="#f5d573"/>
      <stop offset="1" stop-color="#8a5a15"/>
    </linearGradient>
