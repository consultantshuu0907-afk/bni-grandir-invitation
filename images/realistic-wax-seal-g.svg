<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="リアルなボルドー封蝋シール">
  <defs>
    <filter id="waxNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="5" seed="21" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="surface" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" seed="8" result="grain"/>
      <feColorMatrix in="grain" type="matrix" values="0 0 0 0 0.55 0 0 0 0 0.05 0 0 0 0 0.05 0 0 0 .16 0" result="grainColor"/>
      <feBlend in="SourceGraphic" in2="grainColor" mode="overlay"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#120101" flood-opacity="0.62"/>
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.50"/>
    </filter>
    <radialGradient id="waxGrad" cx="38%" cy="32%" r="68%">
      <stop offset="0" stop-color="#f06b55"/>
      <stop offset="0.13" stop-color="#c4312d"/>
      <stop offset="0.42" stop-color="#881313"/>
      <stop offset="0.73" stop-color="#4f0709"/>
      <stop offset="1" stop-color="#2b0304"/>
    </radialGradient>
    <radialGradient id="dentGrad" cx="50%" cy="48%" r="48%">
