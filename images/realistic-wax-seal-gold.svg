<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="リアルなゴールド封蝋シール">
  <defs>
    <filter id="waxNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.026" numOctaves="5" seed="17" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="surface" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="11" result="grain"/>
      <feColorMatrix in="grain" type="matrix" values="0 0 0 0 0.45 0 0 0 0 0.33 0 0 0 0 0.08 0 0 0 .14 0" result="grainColor"/>
      <feBlend in="SourceGraphic" in2="grainColor" mode="overlay"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#1d1404" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <!-- 金蝋の質感：明るいハイライトから深いブロンズへ -->
    <radialGradient id="waxGrad" cx="38%" cy="30%" r="70%">
      <stop offset="0" stop-color="#fff3c0"/>
      <stop offset="0.14" stop-color="#f0cd66"/>
      <stop offset="0.40" stop-color="#c69a36"/>
      <stop offset="0.72" stop-color="#8a6016"/>
      <stop offset="1" stop-color="#4f370c"/>
    </radialGradient>
    <radialGradient id="dentGrad" cx="50%" cy="46%" r="50%">
      <stop offset="0" stop-color="#ca9b34"/>
      <stop offset="0.58" stop-color="#9a721f"/>
      <stop offset="0.72" stop-color="#5c3f0c"/>
      <stop offset="0.84" stop-color="#e0b94e"/>
      <stop offset="1" stop-color="#74510f"/>
    </radialGradient>
    <!-- 刻印の浮き出し：明るいゴールド -->
    <linearGradient id="embossGrad" x1="22%" y1="0" x2="78%" y2="100%">
      <stop offset="0" stop-color="#fff8d8"/>
      <stop offset="0.26" stop-color="#f3d273"/>
      <stop offset="0.55" stop-color="#b98c2a"/>
      <stop offset="0.78" stop-color="#ffe89a"/>
      <stop offset="1" stop-color="#9a6c1a"/>
    </linearGradient>
    <path id="leafLeft" d="M356 702C266 624 249 451 331 323M359 650c-52-29-64-85-35-129M376 575c-48-24-55-72-29-112M400 505c-39-15-46-58-21-88"/>
    <path id="leafRight" d="M668 702c90-78 107-251 25-379M665 650c52-29 64-85 35-129M648 575c48-24 55-72 29-112M624 505c39-15 46-58 21-88"/>
  </defs>

  <rect width="1024" height="1024" fill="none"/>

  <g filter="url(#shadow)">
    <!-- 不規則な蝋の外形 -->
    <path filter="url(#waxNoise)" fill="url(#waxGrad)" d="M512 55c58 28 94 9 135 28 40 18 51 62 100 70 57 10 75 43 75 94 0 44 56 58 83 94 31 41-16 81 11 125 31 51 4 86-42 113-42 25-12 92-58 121-39 25-91 3-120 51-28 47-68 43-113 18-42-23-75 49-124 35-45-13-56-68-108-62-55 7-78-23-87-75-8-49-78-41-107-86-26-40 6-84-32-121-37-36-30-79 9-116 38-36 0-86 36-126 30-34 81-27 99-75 17-45 55-58 101-46 50 13 85-69 142-42z"/>
    <!-- 中央の押し込み凹み -->
    <path fill="url(#dentGrad)" opacity="0.92" d="M512 196c184 0 333 139 333 310S696 816 512 816 179 677 179 506s149-310 333-310z" filter="url(#surface)"/>
    <path fill="none" stroke="#3a2705" stroke-width="18" opacity=".42" d="M512 226c165 0 299 125 299 280S677 786 512 786 213 661 213 506s134-280 299-280z"/>
    <path fill="none" stroke="#ffe79c" stroke-width="8" opacity=".40" d="M512 248c151 0 274 115 274 257S663 762 512 762 238 647 238 505s123-257 274-257z"/>

    <!-- 蝋のツヤ（ハイライト） -->
    <ellipse cx="385" cy="294" rx="138" ry="74" fill="#fff6df" opacity=".22" transform="rotate(-22 385 294)"/>
    <ellipse cx="344" cy="251" rx="78" ry="33" fill="#fffdf2" opacity=".28" transform="rotate(-20 344 251)"/>
    <path d="M661 722c78-28 133-83 158-160" fill="none" stroke="#2a1c04" stroke-width="22" stroke-linecap="round" opacity=".22"/>
  </g>

  <!-- 刻印（同色ゴールドのエンボス：暗い影＋明るい面で立体化） -->
  <g filter="url(#surface)">
    <!-- 影（少し下にずらす） -->
    <g opacity=".5" transform="translate(0,6)">
      <circle cx="512" cy="506" r="222" fill="none" stroke="#4a3206" stroke-width="13"/>
      <use href="#leafLeft" fill="none" stroke="#4a3206" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#leafRight" fill="none" stroke="#4a3206" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="512" y="594" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="265" font-weight="700" fill="#4a3206">G</text>
    </g>
    <!-- 面（明るいゴールド） -->
    <circle cx="512" cy="506" r="222" fill="none" stroke="url(#embossGrad)" stroke-width="12" opacity=".95"/>
    <circle cx="512" cy="506" r="189" fill="none" stroke="url(#embossGrad)" stroke-width="6" opacity=".85" stroke-dasharray="10 22" stroke-linecap="round"/>
    <use href="#leafLeft" fill="none" stroke="url(#embossGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <use href="#leafRight" fill="none" stroke="url(#embossGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="512" y="594" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="265" font-weight="700" fill="url(#embossGrad)" stroke="#5b3d08" stroke-width="4" paint-order="stroke">G</text>
    <path d="M512 250l18 39 42 5-31 29 8 42-37-21-37 21 8-42-31-29 42-5z" fill="url(#embossGrad)" opacity=".92"/>
  </g>
</svg>
